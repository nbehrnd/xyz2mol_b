name: CI_pytest_xyz2mol_b

# name    : pytest.yml
# purpose : regularly run pytest on xyz2mol_b
# date    : [2025-04-14 Mon]

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:
  # schedule:
    # - cron: "0 0 1 * *"  # once each 1st of a month, at 00:00 UTC (cf. https://crontab.guru/)

jobs:
  test:
    strategy:
      matrix:

        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.x"]
    runs-on: ${{ matrix.os }}

    timeout-minutes: 5  # Timeout for each job individually

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies with PyPI
        run: |
          pip install .
          pip install pytest
          pytest --version
          python -m pytest
